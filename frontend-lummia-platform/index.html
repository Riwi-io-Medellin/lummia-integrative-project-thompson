<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lummia Platform | MatiasAC110508</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"> 
    
    <link href="./src/styles/styles.css" rel="stylesheet">
    
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('lummia_theme') || 'neon';
                document.documentElement.setAttribute('data-theme', theme);
                if (theme === 'black' || theme === 'neon') {
                    document.documentElement.style.backgroundColor = theme === 'black' ? '#000000' : '#0b0612';
                } else {
                    document.documentElement.style.backgroundColor = '#f9fafb';
                }
            } catch (e) {}
        })();
    </script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; 
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
